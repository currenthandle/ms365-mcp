name: Staging

# Builds the staging branch on every push and publishes a moving
# `staging` prerelease. Testers install via:
#
#   curl -fsSL https://raw.githubusercontent.com/currenthandle/ms365-mcp/staging/install-staging.sh | sh
#
# That script fetches the binary from the `staging` release tag, which
# this workflow keeps pointed at the latest staging build.

on:
  push:
    branches:
      - staging
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig 0.16.0
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Run unit tests
        run: zig build test

      - name: Compile-check e2e binary
        # `zig build` builds both the MCP server and the e2e binary
        # (build.zig installs both). We don't run the e2e suite in CI
        # because it needs live Graph auth — that's a local task.
        run: zig build

      - name: Build all targets
        run: |
          zig build -Dtarget=aarch64-macos -Doptimize=ReleaseSafe
          mv zig-out/bin/ms365-mcp ms365-mcp-macos-arm64
          rm -rf zig-out

          zig build -Dtarget=x86_64-macos -Doptimize=ReleaseSafe
          mv zig-out/bin/ms365-mcp ms365-mcp-macos-x86_64
          rm -rf zig-out

          zig build -Dtarget=aarch64-linux -Doptimize=ReleaseSafe
          mv zig-out/bin/ms365-mcp ms365-mcp-linux-arm64
          rm -rf zig-out

          zig build -Dtarget=x86_64-linux -Doptimize=ReleaseSafe
          mv zig-out/bin/ms365-mcp ms365-mcp-linux-x86_64
          rm -rf zig-out

      - name: Capture commit info
        id: commit
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          # First line of the commit subject — used in the release body.
          echo "subject=$(git log -1 --pretty=%s)" >> "$GITHUB_OUTPUT"

      - name: Publish moving staging release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: staging
          name: "Staging build (${{ steps.commit.outputs.sha_short }})"
          body: |
            Rolling staging build from the `staging` branch.

            **Latest commit:** `${{ steps.commit.outputs.sha_short }}` — ${{ steps.commit.outputs.subject }}

            Install:
            ```sh
            curl -fsSL https://raw.githubusercontent.com/currenthandle/ms365-mcp/staging/install-staging.sh | sh
            ```

            This is **not** a stable release — it tracks the staging branch and may break.
          prerelease: true
          # The staging tag is reused — the action overwrites the assets.
          files: |
            ms365-mcp-macos-arm64
            ms365-mcp-macos-x86_64
            ms365-mcp-linux-arm64
            ms365-mcp-linux-x86_64
