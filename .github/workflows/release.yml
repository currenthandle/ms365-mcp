name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # build.zig stamps the version into the binary via `git describe
          # --tags`. The default checkout is shallow with no tag refs, which
          # makes describe fall back to a hardcoded constant — so the
          # binary's reported version drifts away from the GitHub tag.
          # Fetch full history + tags so the stamp matches the release tag.
          fetch-depth: 0
          fetch-tags: true

      - name: Install Zig 0.16.0
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Run unit tests
        run: zig build test

      - name: Build all targets
        run: |
          # macOS Apple Silicon (aarch64-macos)
          zig build -Dtarget=aarch64-macos -Doptimize=ReleaseSafe
          mv zig-out/bin/ms365-mcp ms365-mcp-macos-arm64
          rm -rf zig-out

          # macOS Intel (x86_64-macos)
          zig build -Dtarget=x86_64-macos -Doptimize=ReleaseSafe
          mv zig-out/bin/ms365-mcp ms365-mcp-macos-x86_64
          rm -rf zig-out

          # Linux ARM64 (aarch64-linux)
          zig build -Dtarget=aarch64-linux -Doptimize=ReleaseSafe
          mv zig-out/bin/ms365-mcp ms365-mcp-linux-arm64
          rm -rf zig-out

          # Linux x86_64 (x86_64-linux)
          zig build -Dtarget=x86_64-linux -Doptimize=ReleaseSafe
          mv zig-out/bin/ms365-mcp ms365-mcp-linux-x86_64
          rm -rf zig-out

      - name: Verify binary version matches tag
        # Run the just-built linux-x86_64 binary (the runner is x86_64-linux,
        # so this is the only target we can exec without an emulator) and
        # check that --version reports exactly the release tag. If they
        # disagree, fail the release rather than ship a mismatched binary.
        run: |
          set -e
          chmod +x ms365-mcp-linux-x86_64
          stamped="$(./ms365-mcp-linux-x86_64 --version | tr -d '[:space:]')"
          expected="${GITHUB_REF_NAME}"
          echo "Stamped:  ${stamped}"
          echo "Expected: ${expected}"
          if [ "${stamped}" != "${expected}" ]; then
            echo "::error::Binary version (${stamped}) does not match release tag (${expected})."
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          # Hyphenated tags (e.g. v0.2.0-rc.1) are pre-releases by convention.
          # GitHub's /releases/latest endpoint excludes pre-releases, which
          # means install.sh keeps pulling the last stable tag and doesn't
          # ship release candidates to non-tester users by accident.
          prerelease: ${{ contains(github.ref, '-') }}
          files: |
            ms365-mcp-macos-arm64
            ms365-mcp-macos-x86_64
            ms365-mcp-linux-arm64
            ms365-mcp-linux-x86_64
