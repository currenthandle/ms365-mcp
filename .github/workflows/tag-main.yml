name: Tag main

# Auto-tag every push to main as the stable release of the version
# declared in VERSION. Pushing the tag triggers release.yml, which
# builds the binaries and publishes a stable release (no -rc suffix,
# so GitHub's /releases/latest endpoint surfaces it to install.sh).
#
# Skips if the tag already exists — bumping the release means bumping
# VERSION in a commit, then merging that to main.

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full tag history so we can check whether the tag exists.
          fetch-depth: 0

      - name: Resolve target tag
        id: target
        run: |
          set -e
          tag="$(cat VERSION | tr -d '[:space:]')"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "Target tag: ${tag}"

      - name: Skip if tag already exists
        id: check
        env:
          TAG: ${{ steps.target.outputs.tag }}
        run: |
          set -e
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "Tag ${TAG} already exists — bump VERSION to cut a new release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: steps.check.outputs.skip != 'true'
        env:
          TAG: ${{ steps.target.outputs.tag }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "${TAG} — auto-tagged main build"
          git push origin "${TAG}"
