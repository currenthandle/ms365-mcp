name: Release staging

# On every push to staging: compute the next rc tag (vX.Y.Z-rc.N),
# create it, then build + publish a pre-release. The rc number
# auto-increments based on existing tags for the current VERSION base.

on:
  push:
    branches:
      - staging

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.nexttag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next rc tag
        id: nexttag
        run: |
          set -e
          base="$(cat VERSION | tr -d '[:space:]')"
          highest=$(git tag --list "${base}-rc.*" \
            | sed -E "s/^${base}-rc\.//" \
            | grep -E '^[0-9]+$' \
            | sort -n \
            | tail -1)
          if [ -z "${highest}" ]; then
            next=1
          else
            next=$((highest + 1))
          fi
          tag="${base}-rc.${next}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "Next staging tag: ${tag}"

      - name: Create and push tag
        env:
          TAG: ${{ steps.nexttag.outputs.tag }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "${TAG} — auto-tagged staging build"
          git push origin "${TAG}"

  release:
    needs: tag
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.tag.outputs.tag }}
